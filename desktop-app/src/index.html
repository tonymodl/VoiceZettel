<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceZettel</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
        .loading {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: #0a0a0a; color: #71717a;
            font-family: system-ui; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Connecting to VoiceZettel...</div>
    <iframe id="app" style="display:none" src="http://localhost:3000"></iframe>
    <script>
        const iframe = document.getElementById('app');
        const loading = document.getElementById('loading');
        iframe.onload = () => {
            loading.style.display = 'none';
            iframe.style.display = 'block';
        };
        // Retry connection if localhost not ready
        setTimeout(() => {
            if (loading.style.display !== 'none') {
                iframe.src = 'http://localhost:3000';
            }
        }, 3000);
    </script>
</body>
</html>
